<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CX制作 - 单文件控制面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Segoe UI",Arial,sans-serif;height:100vh;color:white;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);overflow:hidden;display:flex;justify-content:center;align-items:center;}
.panel{position:relative;z-index:1;width:900px;padding:35px;border-radius:30px;background:rgba(255,255,255,0.08);backdrop-filter:blur(18px);text-align:center;display:none;}
h1{font-size:36px;margin-bottom:20px;}
.row{margin:18px 0;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:15px;}
button{height:46px;padding:0 22px;border:none;border-radius:16px;background:linear-gradient(135deg,#00c6ff,#0072ff);color:white;font-size:15px;cursor:pointer;transition:0.3s;box-shadow:0 4px 15px rgba(0,114,255,0.4);}
button:hover{transform:translateY(-2px) scale(1.03);background:linear-gradient(135deg,#4facfe,#00f2fe);}
input{width:420px;height:48px;margin:15px auto;border:none;outline:none;border-radius:20px;padding:0 18px;color:white;font-size:16px;background:rgba(255,255,255,0.12);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.2);}
input::placeholder{color:rgba(255,255,255,0.65);}
#log{margin-top:25px;width:100%;height:220px;overflow:auto;text-align:left;padding:18px;border-radius:22px;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);}
select{height:45px;padding:0 15px;border:none;outline:none;border-radius:14px;color:white;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);font-size:15px;}
option{color:black;}
.rain{position:fixed;width:100%;height:100%;top:0;left:0;overflow:hidden;z-index:0;}
.drop{position:absolute;bottom:100%;width:2px;height:80px;background:linear-gradient(transparent,rgba(255,255,255,0.7));animation:rain linear infinite;}
@keyframes rain{to{transform:translateY(120vh);}}
</style>
</head>
<body>
<div class="rain" id="rain"></div>

<!-- 上级面板 -->
<div class="panel" id="mainPanel" style="display:block;">
<h1>CX制作 - 上级控制面板</h1>
<div class="row">
<button onclick="showPanel('selfPanel')">控制自己手机</button>
<button onclick="showPanel('otherPanel')">控制其他手机</button>
</div>
</div>

<!-- 控制自己手机面板 -->
<div class="panel" id="selfPanel">
<h1>CX制作 - 控制自己手机</h1>
<div class="row"><button onclick="showPanel('mainPanel')">⬅ 返回上级面板</button></div>
<div class="row">
<button onclick="goHome()">返回桌面</button>
<button onclick="rebootPhone()">重启手机</button>
<button onclick="rebootFastboot()">重启到 Fastboot</button>
</div>
<div class="row">
<input id="selfPackageInput" placeholder="输入包名，例如 com.android.settings">
<button onclick="openApp('self')">打开 APP</button>
</div>
<div class="row">
<input id="selfCustomCmd" placeholder="输入自定义 shell 指令">
<button onclick="runCustom('self')">执行指令</button>
</div>
<div class="row">
<input id="selfFilePath" placeholder="输入要删除的文件路径">
<button onclick="deleteFile('self')">删除文件</button>
</div>
<div class="row"><button onclick="listFiles('self')">获取所有文件列表</button></div>
<div id="selfLog"></div>
</div>

<!-- 控制其他手机面板 -->
<div class="panel" id="otherPanel">
<h1 id="otherTitle">CX制作 - 控制其他手机</h1>
<div class="row"><button onclick="showPanel('mainPanel')">⬅ 返回上级面板</button></div>
<div class="row">
<button id="connectBtn" onclick="connectDevice()">连接手机</button>
<select onchange="changeLang(this.value)">
<option value="zh">中文</option>
<option value="en">English</option>
</select>
</div>
<div class="row">
<button id="homeBtn" onclick="goHome('other')">返回桌面</button>
<button id="rebootBtn" onclick="rebootPhone('other')">重启手机</button>
<button id="fastbootBtn" onclick="rebootFastboot('other')">重启到 Fastboot</button>
</div>
<div class="row">
<input id="otherPackageInput" placeholder="输入包名，例如 com.android.settings">
<button id="openBtn" onclick="openApp('other')">打开 APP</button>
</div>
<div class="row">
<input id="otherCustomCmd" placeholder="输入自定义 shell 指令">
<button id="runBtn" onclick="runCustom('other')">执行指令</button>
</div>
<div class="row">
<input id="otherFilePath" placeholder="输入要删除的文件路径">
<button onclick="deleteFile('other')">删除文件</button>
</div>
<div class="row"><button onclick="listFiles('other')">获取所有文件列表</button></div>
<div id="otherLog"></div>
</div>

<script>
// 雨滴效果
const rain=document.getElementById('rain');
for(let i=0;i<180;i++){
    const drop=document.createElement('div');
    drop.classList.add('drop');
    drop.style.left=Math.random()*100+'vw';
    drop.style.animationDuration=(0.5+Math.random()*1)+'s';
    drop.style.opacity=Math.random();
    drop.style.height=(40+Math.random()*80)+'px';
    drop.style.animationDelay=Math.random()*2+'s';
    rain.appendChild(drop);
}

// 面板切换
function showPanel(panelId){
    document.getElementById('mainPanel').style.display='none';
    document.getElementById('selfPanel').style.display='none';
    document.getElementById('otherPanel').style.display='none';
    document.getElementById(panelId).style.display='block';
}

// 日志
function log(text, panel){const logEl=panel==='other'?document.getElementById('otherLog'):document.getElementById('selfLog');logEl.innerHTML+=text+'<br>';logEl.scrollTop=logEl.scrollHeight;}

// 控制设备占位
let device=null;
async function connectDevice(){try{device=await navigator.usb.requestDevice({filters:[]});log('已选择设备: '+device.productName,'other');await device.open();log('USB 已连接','other');}catch(e){log('连接失败: '+e,'other');}}
async function sendADBCommand(cmd){log('执行: '+cmd,'other');}

// 基础功能
async function goHome(panel){await sendADBCommand('input keyevent KEYCODE_HOME');}
async function rebootPhone(panel){await sendADBCommand('reboot');}
async function rebootFastboot(panel){await sendADBCommand('reboot bootloader');}
async function openApp(panel){const pkg=panel==='other'?document.getElementById('otherPackageInput').value:document.getElementById('selfPackageInput').value;const cmd=`monkey -p ${pkg} -c android.intent.category.LAUNCHER 1`;await sendADBCommand(cmd);}
async function runCustom(panel){const cmd=panel==='other'?document.getElementById('otherCustomCmd').value:document.getElementById('selfCustomCmd').value;await sendADBCommand(cmd);}
async function deleteFile(panel){const path=panel==='other'?document.getElementById('otherFilePath').value:document.getElementById('selfFilePath').value;if(!path){log('请输入文件路径',panel);return;}await sendADBCommand(`rm ${path}`);log(`已删除文件: ${path}`,panel);}
async function listFiles(panel){await sendADBCommand('ls -R /');log('已获取文件列表，下载所需文件请使用对应路径',panel);}

// 多语言
const langData={zh:{title:'CX制作 - 控制其他手机',connect:'连接手机',home:'返回桌面',reboot:'重启手机',fastboot:'重启到 Fastboot',open:'打开 APP',run:'执行指令',pkg:'输入包名，例如 com.android.settings',shell:'输入自定义 shell 指令'},en:{title:'CX制作 - Control Other Device',connect:'Connect Device',home:'Go Home',reboot:'Reboot Phone',fastboot:'Reboot Fastboot',open:'Open APP',run:'Run Command',pkg:'Enter package name',shell:'Enter custom shell command'}};
function changeLang(lang){const t=langData[lang];document.getElementById('otherTitle').innerText=t.title;document.getElementById('connectBtn').innerText=t.connect;document.getElementById('homeBtn').innerText=t.home;document.getElementById('rebootBtn').innerText=t.reboot;document.getElementById('fastbootBtn').innerText=t.fastboot;document.getElementById('openBtn').innerText=t.open;document.getElementById('runBtn').innerText=t.run;document.getElementById('otherPackageInput').placeholder=t.pkg;document.getElementById('otherCustomCmd').placeholder=t.shell;}
</script>
</body>
</html>
